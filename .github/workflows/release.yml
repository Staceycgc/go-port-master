name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build release binaries
        working-directory: backend
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p ../dist/release

          build_one() {
            local goos="$1"
            local goarch="$2"
            local ext="$3"
            local base="port-master-${version}-${goos}-${goarch}"
            local out="../dist/release/${base}${ext}"

            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -ldflags="-s -w" -o "$out" ./cmd/port-master

            if [ "$goos" = "windows" ]; then
              mkdir -p "../dist/release/${base}"
              cp "$out" "../dist/release/${base}/port-master${ext}"
              cp ../README.md "../dist/release/${base}/"
              (cd "../dist/release/${base}" && zip -r "../${base}.zip" .)
              rm -rf "../dist/release/${base}" "$out"
            else
              mkdir -p "../dist/release/${base}"
              cp "$out" "../dist/release/${base}/port-master"
              cp ../README.md "../dist/release/${base}/"
              tar -czf "../dist/release/${base}.tar.gz" -C "../dist/release/${base}" .
              rm -rf "../dist/release/${base}" "$out"
            fi
          }

          build_one windows amd64 .exe
          build_one windows arm64 .exe
          build_one linux amd64 ""
          build_one linux arm64 ""
          build_one darwin amd64 ""
          build_one darwin arm64 ""

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/release/*
